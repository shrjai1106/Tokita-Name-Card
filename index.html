<title>Tokita – Mike Murugan</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: radial-gradient(ellipse at 60% 40%, #f7e8e8 0%, #eddada 40%, #d6c4c4 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  font-family: Arial, sans-serif;
}

/* Sakura behind EVERYTHING, completely non-interactive */
#sakura-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  pointer-events: none;
  touch-action: none;
}

.hint {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #a07070;
  margin-bottom: 20px;
}

.card-wrap {
  width: 860px;
  max-width: 95vw;
  position: relative;
}

.card-img {
  width: 100%;
  border-radius: 8px;
  display: block;
  box-shadow: 0 8px 40px rgba(0,0,0,0.22);
}

#imgBack { display: none; }

/* Buttons */
.btn-row {
  display: flex;
  gap: 12px;
  margin-top: 20px;
  justify-content: center;
}

.side-btn {
  padding: 12px 28px;
  border-radius: 30px;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  border: 2px solid #CC1E1E;
  background: white;
  color: #CC1E1E;
  font-weight: 600;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.side-btn:hover,
.side-btn:focus {
  background: #CC1E1E;
  color: white;
}

.side-btn.active {
  background: #CC1E1E;
  color: white;
  box-shadow: 0 4px 16px rgba(204,30,30,0.35);
}
</style>
</head>

<div class="btn-row">
  <button class="side-btn active" id="btnFront" onclick="showFace('front')">
    ◀ Contact Info
  </button>
  <button class="side-btn" id="btnBack" onclick="showFace('back')">
    Products &amp; Services ▶
  </button>
</div>

<script>
function showFace(side) {
  var front  = document.getElementById('imgFront');
  var back   = document.getElementById('imgBack');
  var btnF   = document.getElementById('btnFront');
  var btnB   = document.getElementById('btnBack');

  if (side === 'back') {
    front.style.display = 'none';
    back.style.display  = 'block';
    btnB.classList.add('active');
    btnF.classList.remove('active');
  } else {
    back.style.display  = 'none';
    front.style.display = 'block';
    btnF.classList.add('active');
    btnB.classList.remove('active');
  }
}

// Tilt — desktop only, won't interfere with mobile
var wrap = document.getElementById('cardWrap');
var isMobile = ('ontouchstart' in window);

if (!isMobile) {
  wrap.addEventListener('mousemove', function(e) {
    var r  = wrap.getBoundingClientRect();
    var dx = (e.clientX - (r.left + r.width  / 2)) / (r.width  / 2);
    var dy = (e.clientY - (r.top  + r.height / 2)) / (r.height / 2);
    wrap.style.transition = 'transform 0.08s ease, filter 0.08s ease';
    wrap.style.transform  = 'perspective(1200px) rotateY(' + (dx*10) + 'deg) rotateX(' + (-dy*6) + 'deg) translateY(-6px)';
    wrap.style.filter     = 'drop-shadow(' + (-dx*16) + 'px ' + (18+dy*8) + 'px 36px rgba(0,0,0,0.25))';
  });

  wrap.addEventListener('mouseleave', function() {
    wrap.style.transition = 'transform 0.5s ease, filter 0.5s ease';
    wrap.style.transform  = 'perspective(1200px) rotateY(0deg) rotateX(0deg) translateY(0px)';
    wrap.style.filter     = 'drop-shadow(0 20px 36px rgba(0,0,0,0.15))';
  });
}

// Sakura
var canvas = document.getElementById('sakura-canvas');
var ctx    = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function drawPetal(x, y, s, rot, op, hue) {
  ctx.save();
  ctx.translate(x, y); ctx.rotate(rot); ctx.globalAlpha = op;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(s*.6,-s*.3, s,s*.4, 0,s);
  ctx.bezierCurveTo(-s,s*.4, -s*.6,-s*.3, 0,0);
  var g = ctx.createRadialGradient(0,s*.4,0,0,s*.4,s*.8);
  g.addColorStop(0,'hsla('+hue+',90%,88%,1)');
  g.addColorStop(1,'hsla('+hue+',80%,78%,0.3)');
  ctx.fillStyle = g; ctx.fill();
  ctx.restore();
}

var petals = [];
for (var i = 0; i < 35; i++) {
  petals.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    s: 8+Math.random()*14,
    speedY: .5+Math.random()*.9,
    speedX: (Math.random()-.5)*.4,
    rot: Math.random()*Math.PI*2,
    rotSpeed: (Math.random()-.5)*.02,
    op: .3+Math.random()*.5,
    hue: 340+Math.random()*25,
    sway: Math.random()*Math.PI*2,
    swaySpeed: .007+Math.random()*.01
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (var i=0; i<petals.length; i++) {
    var p = petals[i];
    p.sway += p.swaySpeed;
    p.x += p.speedX + Math.sin(p.sway)*.5;
    p.y += p.speedY;
    p.rot += p.rotSpeed;
    if (p.y > canvas.height+30) { p.y=-20; p.x=Math.random()*canvas.width; }
    drawPetal(p.x,p.y,p.s,p.rot,p.op,p.hue);
  }
  requestAnimationFrame(animate);
}
animate();
</script>
