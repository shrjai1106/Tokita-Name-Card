<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokita – Mike Murugan</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: radial-gradient(ellipse at 60% 40%, #f7e8e8 0%, #eddada 40%, #d6c4c4 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  font-family: Arial, sans-serif;
  gap: 16px;
}

#sakura-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  pointer-events: none;
  touch-action: none;
}

.hint {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #a07070;
  text-align: center;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  align-items: center;
  z-index: 20;
}

.side-btn {
  padding: 11px 24px;
  border-radius: 30px;
  font-size: 12px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  cursor: pointer;
  border: 2px solid #CC1E1E;
  background: white;
  color: #CC1E1E;
  font-weight: 700;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.side-btn:hover { background: #CC1E1E; color: white; }
.side-btn.active {
  background: #CC1E1E;
  color: white;
  box-shadow: 0 4px 16px rgba(204,30,30,0.3);
}

.mag-btn {
  padding: 11px 20px;
  border-radius: 30px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  border: 2px solid #CC1E1E;
  background: white;
  color: #CC1E1E;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.2s;
}
.mag-btn:hover, .mag-btn.on { background: #CC1E1E; color: white; }

/* Card wrapper */
.card-wrap {
  width: 900px;
  max-width: 98vw;
  position: relative;
}

.card-img {
  width: 100%;
  border-radius: 8px;
  display: block;
  box-shadow: 0 8px 40px rgba(0,0,0,0.22);
  user-select: none;
}

#imgBack { display: none; }

/* Magnifier */
.magnifier {
  position: absolute;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: 3px solid #CC1E1E;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  pointer-events: none;
  display: none;
  overflow: hidden;
  z-index: 10;
  background-repeat: no-repeat;
  background-color: white;
}
</style>
</head>

<canvas id="sakura-canvas"></canvas>

<p class="hint">Use buttons to switch sides · 🔍 Magnifier for small text</p>

  <button class="side-btn active" id="btnFront" onclick="showFace('front')">◀ Contact Info</button>

  <button class="mag-btn"         id="magBtn"   onclick="toggleMag()">🔍 Magnifier</button>
</div>

EAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAEREAREQBERAf/9k="  alt="Back">
  <div class="magnifier" id="magnifier"></div>
</div>

<script>
var isMobile  = ('ontouchstart' in window);
var isFlipped = false;
var magActive = false;
var magSize   = 160;
var magZoom   = 2.8;
var cardWrap  = document.getElementById('cardWrap');

// ── FACE SWITCH ──
function showFace(side) {
  isFlipped = (side === 'back');
  document.getElementById('imgFront').style.display = isFlipped ? 'none' : 'block';
  document.getElementById('imgBack').style.display  = isFlipped ? 'block' : 'none';
  document.getElementById('btnFront').classList.toggle('active', !isFlipped);
  document.getElementById('btnBack').classList.toggle('active',  isFlipped);
  document.getElementById('magnifier').style.display = 'none';
}

// ── TILT desktop only ──
if (!isMobile) {
  cardWrap.addEventListener('mousemove', function(e) {
    if (magActive) return;
    var r  = cardWrap.getBoundingClientRect();
    var dx = (e.clientX - (r.left + r.width  / 2)) / (r.width  / 2);
    var dy = (e.clientY - (r.top  + r.height / 2)) / (r.height / 2);
    cardWrap.style.transition = 'transform 0.08s ease';
    cardWrap.style.transform  = 'perspective(1400px) rotateY('+(dx*6)+'deg) rotateX('+(-dy*3)+'deg)';
    cardWrap.style.filter     = 'drop-shadow('+(-dx*12)+'px '+(14+dy*5)+'px 28px rgba(0,0,0,0.22))';
  });
  cardWrap.addEventListener('mouseleave', function() {
    cardWrap.style.transition = 'transform 0.5s ease, filter 0.5s ease';
    cardWrap.style.transform  = 'none';
    cardWrap.style.filter     = 'none';
  });
}

// ── MAGNIFIER ──
function toggleMag() {
  magActive = !magActive;
  var btn = document.getElementById('magBtn');
  btn.classList.toggle('on', magActive);
  btn.textContent = magActive ? '🔍 Magnifier ON' : '🔍 Magnifier';
  if (!magActive) document.getElementById('magnifier').style.display = 'none';
}

function moveMag(clientX, clientY) {
  var activeImg = document.getElementById(isFlipped ? 'imgBack' : 'imgFront');
  var mag       = document.getElementById('magnifier');
  var r         = activeImg.getBoundingClientRect();
  var posX      = clientX - r.left;
  var posY      = clientY - r.top;
  if (posX < 0 || posY < 0 || posX > r.width || posY > r.height) { mag.style.display = 'none'; return; }
  var wrapR = cardWrap.getBoundingClientRect();
  mag.style.display            = 'block';
  mag.style.left               = (clientX - wrapR.left - magSize/2) + 'px';
  mag.style.top                = (clientY - wrapR.top  - magSize/2 - (isMobile ? 90 : 0)) + 'px';
  mag.style.backgroundImage    = 'url(' + activeImg.src + ')';
  mag.style.backgroundSize     = (r.width*magZoom)+'px '+(r.height*magZoom)+'px';
  mag.style.backgroundPosition = -(posX*magZoom - magSize/2)+'px '+-(posY*magZoom - magSize/2)+'px';
}

cardWrap.addEventListener('mousemove',  function(e) { if (magActive) moveMag(e.clientX, e.clientY); });
cardWrap.addEventListener('mouseleave', function()  { if (magActive) document.getElementById('magnifier').style.display = 'none'; });
cardWrap.addEventListener('touchmove',  function(e) { if (magActive) moveMag(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
cardWrap.addEventListener('touchend',   function()  { if (magActive) setTimeout(function(){ document.getElementById('magnifier').style.display='none'; }, 300); });

// ── SAKURA ──
var canvas = document.getElementById('sakura-canvas');
var ctx    = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

function drawPetal(x,y,s,rot,op,hue) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.globalAlpha=op;
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.bezierCurveTo(s*.6,-s*.3,s,s*.4,0,s);
  ctx.bezierCurveTo(-s,s*.4,-s*.6,-s*.3,0,0);
  var g=ctx.createRadialGradient(0,s*.4,0,0,s*.4,s*.8);
  g.addColorStop(0,'hsla('+hue+',90%,88%,1)');
  g.addColorStop(1,'hsla('+hue+',80%,78%,0.3)');
  ctx.fillStyle=g; ctx.fill(); ctx.restore();
}
var petals=[];
for(var i=0;i<35;i++) petals.push({
  x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
  s:8+Math.random()*14, speedY:.5+Math.random()*.9, speedX:(Math.random()-.5)*.4,
  rot:Math.random()*Math.PI*2, rotSpeed:(Math.random()-.5)*.02, op:.3+Math.random()*.5,
  hue:340+Math.random()*25, sway:Math.random()*Math.PI*2, swaySpeed:.007+Math.random()*.01
});
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(var i=0;i<petals.length;i++){
    var p=petals[i]; p.sway+=p.swaySpeed; p.x+=p.speedX+Math.sin(p.sway)*.5;
    p.y+=p.speedY; p.rot+=p.rotSpeed;
    if(p.y>canvas.height+30){p.y=-20;p.x=Math.random()*canvas.width;}
    drawPetal(p.x,p.y,p.s,p.rot,p.op,p.hue);
  }
  requestAnimationFrame(animate);
}
animate();
</script>
